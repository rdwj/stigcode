    title: The organization, where appropriate, enters into Memoranda of Understanding,
      Memoranda of Agreement, Letters of Intent, Computer Matching Agreements, or
      similar agreements, with third parties that specifically enumerate the purposes
      for which the personally identifiable information (PII) may be used.
  CCI-003592:
    nist_control: UL-2
    title: The organization monitors its staff on the authorized sharing of personally
      identifiable information (PII) with third parties.
  CCI-003593:
    nist_control: UL-2
    title: The organization audits its staff on the authorized sharing of personally
      identifiable information (PII) with third parties.
  CCI-003594:
    nist_control: UL-2
    title: The organization trains its staff on the authorized sharing of personally
      identifiable information (PII) with third parties.
  CCI-003595:
    nist_control: UL-2
    title: The organization trains its staff on the consequences of unauthorized use
      or sharing of personally identifiable information (PII).
  CCI-003596:
    nist_control: UL-2
    title: The organization evaluates any proposed new instances of sharing personally
      identifiable information (PII) with third parties to assess whether the sharing
      is authorized.
  CCI-003597:
    nist_control: UL-2
    title: The organization evaluates any proposed new instances of sharing personally
      identifiable information (PII) with third parties to assess whether additional
      or new public notice is required.
  CCI-003599:
    nist_control: SC-37
    title: The organization defines the individuals or information systems to be the
      only recipients of organization-defined information, information system components,
      or devices, by employing organization-defined security safeguards.
