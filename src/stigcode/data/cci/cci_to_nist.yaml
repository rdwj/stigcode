# CCI to NIST 800-53 mapping
# Source: DISA CCI v2 (via sarif-standard/taxonomies)
# Generated from: tests/fixtures/reference/DISA_CCI_v2.sarif
mappings:
  CCI-000001:
    nist_control: AC-1
    title: The organization develops an access control policy that addresses purpose,
      scope, roles, responsibilities, management commitment, coordination among organizational
      entities, and compliance.
  CCI-000002:
    nist_control: AC-1
    title: The organization disseminates the access control policy to organization-defined
      personnel or roles.
  CCI-000003:
    nist_control: AC-1
    title: The organization reviews and updates the access control policy in accordance
      with organization-defined frequency.
  CCI-000004:
    nist_control: AC-1
    title: The organization develops procedures to facilitate the implementation of
      the access control policy and associated access controls.
  CCI-000005:
    nist_control: AC-1
    title: The organization disseminates the procedures to facilitate access control
      policy and associated access controls to the organization-defined personnel
      or roles.
  CCI-000006:
    nist_control: AC-1
    title: The organization reviews and updates the access control procedures in accordance
      with organization-defined frequency.
  CCI-000007:
    nist_control: []
    title: The organization manages information system accounts by identifying account
      types (i.e., individual, group, system, application, guest/anonymous, and temporary).
  CCI-000008:
    nist_control: AC-2
    title: The organization establishes conditions for group membership.
  CCI-000009:
    nist_control: []
    title: The organization manages information system accounts by identifying authorized
      users of the information system and specifying access privileges.
  CCI-000010:
    nist_control: AC-2
    title: The organization requires approvals by organization-defined personnel or
      roles for requests to create information system accounts.
  CCI-000011:
    nist_control: AC-2
    title: The organization creates, enables, modifies, disables, and removes information
      system accounts in accordance with organization-defined procedures or conditions.
  CCI-000012:
    nist_control: AC-2
    title: The organization reviews information system accounts for compliance with
      account management requirements per organization-defined frequency.
  CCI-000013:
    nist_control: []
    title: The organization manages information system accounts by notifying account
      managers when temporary accounts are no longer required and when information
      system users are terminated, transferred, or information system usage or need-to-know/need-to-share
      changes.
  CCI-000014:
    nist_control: []
    title: The organization manages information system accounts by granting access
      to the system based on a valid access authorization; intended system usage;
      and other attributes as required by the organization or associated missions/business
      functions.
  CCI-000015:
    nist_control: AC-2
    title: The organization employs automated mechanisms to support the information
      system account management functions.
  CCI-000016:
    nist_control: AC-2
    title: The information system automatically removes or disables temporary accounts
      after an organization-defined time period for each type of account.
  CCI-000017:
    nist_control: AC-2
    title: The information system automatically disables inactive accounts after an
      organization-defined time period.
  CCI-000018:
    nist_control: AC-2
    title: The information system automatically audits account creation actions.
  CCI-000019:
    nist_control: AC-2
    title: The organization requires that users log out in accordance with the organization-defined
      time period of inactivity or description of when to log out.
  CCI-000020:
    nist_control: []
    title: The information system dynamically manages user privileges and associated
      access authorizations.
  CCI-000021:
    nist_control: AC-3
    title: The information system enforces dual authorization for organization-defined
      privileged commands and/or other organization-defined actions.
  CCI-000022:
    nist_control: []
    title: The information system enforces one or more organization-defined nondiscretionary
      access control policies over an organization-defined set of users and resources.
  CCI-000023:
    nist_control: []
    title: The organization develops an organization-wide information security program
      plan that provides sufficient information about the program management controls
      and common controls (including specification of parameters for any assignment
      and selection operations either explicitly or by reference) to enable an implementation
      that is unambiguously compliant with the intent of the plan, and a determination
      of the risk to be incurred if the plan is implemented as intended.
  CCI-000024:
    nist_control: AC-3
    title: The information system prevents access to organization-defined security-relevant
      information except during secure, non-operable system states.
  CCI-000025:
    nist_control: []
    title: The information system enforces information flow control using explicit
      security attributes on information, source, and destination objects as a basis
      for flow control decisions.
  CCI-000026:
    nist_control: AC-4
    title: The information system uses protected processing domains to enforce organization-defined
      information flow control policies as a basis for flow control decisions.
  CCI-000027:
    nist_control: AC-4
    title: The information system enforces dynamic information flow control based
      on organization-defined policies.
  CCI-000028:
    nist_control: AC-4
    title: The information system prevents encrypted information from bypassing content-checking
      mechanisms by employing organization-defined procedures or methods.
  CCI-000029:
    nist_control: AC-4
    title: The information system enforces organization-defined limitations on the
      embedding of data types within other data types.
  CCI-000030:
    nist_control: AC-4
    title: The information system enforces information flow control based on organization-defined
      metadata.
  CCI-000031:
    nist_control: AC-4
    title: The information system enforces organization-defined one-way flows using
      hardware mechanisms.
  CCI-000032:
    nist_control: AC-4
    title: The information system enforces information flow control using organization-defined
      security policy filters as a basis for flow control decisions for organization-defined
      information flows.
  CCI-000033:
    nist_control: []
    title: The information system enforces the use of human review for organization-defined
      security policy filters when the system is not capable of making an information
      flow control decision.
  CCI-000034:
    nist_control: AC-4
    title: The information system provides the capability for a privileged administrator
      to enable/disable organization-defined security policy filters under organization-defined
      conditions.
  CCI-000035:
    nist_control: AC-4
    title: The information system provides the capability for privileged administrators
      to configure the organization-defined security policy filters to support different
      security policies.
  CCI-000036:
    nist_control: AC-5
    title: The organization separates organization-defined duties of individuals.
  CCI-000037:
    nist_control: []
    title: The organization implements separation of duties through assigned information
      system access authorizations.
  CCI-000038:
    nist_control: []
    title: The organization explicitly authorizes access to organization-defined security
      functions and security-relevant information.
  CCI-000039:
    nist_control: AC-6
    title: The organization requires that users of information system accounts or
      roles, with access to organization-defined security functions or security-relevant
      information, use non-privileged accounts, or roles, when accessing nonsecurity
      functions.
  CCI-000040:
    nist_control: []
    title: The organization audits any use of privileged accounts, or roles, with
      access to organization-defined security functions or security-relevant information,
      when accessing other system functions.
  CCI-000041:
    nist_control: AC-6
    title: The organization authorizes network access to organization-defined privileged
      commands only for organization-defined compelling operational needs.
  CCI-000042:
    nist_control: AC-6
    title: The organization documents the rationale for authorized network access
      to organization-defined privileged commands in the security plan for the information
      system.
  CCI-000043:
    nist_control: AC-7
    title: The organization defines the maximum number of consecutive invalid logon
      attempts to the information system by a user during an organization-defined
      time period.
  CCI-000044:
    nist_control: AC-7
    title: The information system enforces the organization-defined limit of consecutive
      invalid logon attempts by a user during the organization-defined time period.
  CCI-000045:
    nist_control: []
    title: The organization defines in the security plan, explicitly or by reference,
      the time period for lock out mode or delay period.
  CCI-000046:
    nist_control: []
    title: The organization selects either a lock out mode for the organization-defined
      time period or delays the next login prompt for the organization-defined delay
      period for information system responses to consecutive invalid access attempts.
  CCI-000047:
    nist_control: []
    title: The information system delays next login prompt according to the organization-defined
      delay algorithm, when the maximum number of unsuccessful attempts is exceeded,
      automatically locks the account/node for an organization-defined time period
      or locks the account/node until released by an Administrator IAW organizational
      policy.
  CCI-000048:
    nist_control: AC-8
    title: The information system displays an organization-defined system use notification
      message or banner before granting access to the system that provides privacy
      and security notices consistent with applicable federal laws, Executive Orders,
      directives, policies, regulations, standards, and guidance.
  CCI-000049:
    nist_control: []
    title: 'The organization defines a system use notification message or banner displayed
      before granting access to the system that provides privacy and security notices
      consistent with applicable federal laws, Executive Orders, directives, policies,
      regulations, standards, and guidance and states that: (i) users are accessing
      a U.S. Government information system; (ii) system usage may be monitored, recorded,
      and subject to audit; (iii) unauthorized use of the system is prohibited and
      subject to criminal and civil penalties; and (iv) use of the system indicates
      consent to monitoring and recording.'
  CCI-000050:
    nist_control: AC-8
    title: The information system retains the notification message or banner on the
      screen until users acknowledge the usage conditions and take explicit actions
      to log on to or further access the information system.
  CCI-000051:
    nist_control: []
    title: The organization approves the information system use notification message
      before its use.
  CCI-000052:
    nist_control: AC-9
    title: The information system notifies the user, upon successful logon (access)
      to the system, of the date and time of the last logon (access).
  CCI-000053:
    nist_control: AC-9
    title: The information system notifies the user, upon successful logon/access,
      of the number of unsuccessful logon/access attempts since the last successful
      logon/access.
  CCI-000054:
    nist_control: AC-10
    title: The information system limits the number of concurrent sessions for each
      organization-defined account and/or account type to an organization-defined
      number of sessions.
  CCI-000055:
    nist_control: AC-10
    title: The organization defines the maximum number of concurrent sessions to be
      allowed for each organization-defined account and/or account type.
  CCI-000056:
    nist_control: AC-11
    title: The information system retains the session lock until the user reestablishes
      access using established identification and authentication procedures.
  CCI-000057:
    nist_control: AC-11
    title: The information system initiates a session lock after the organization-defined
      time period of inactivity.
  CCI-000058:
    nist_control: AC-11
    title: The information system provides the capability for users to directly initiate
      session lock mechanisms.
  CCI-000059:
    nist_control: AC-11
    title: The organization defines the time period of inactivity after which the
      information system initiates a session lock.
  CCI-000060:
    nist_control: AC-11
    title: The information system conceals, via the session lock, information previously
      visible on the display with a publicly viewable image.
  CCI-000061:
    nist_control: AC-14
    title: The organization identifies and defines organization-defined user actions
      that can be performed on the information system without identification or authentication
      consistent with organizational missions/business functions.
  CCI-000062:
    nist_control: []
    title: The organization permits actions to be performed without identification
      and authentication only to the extent necessary to accomplish mission/business
      objectives.
  CCI-000063:
    nist_control: AC-17
    title: The organization defines allowed methods of remote access to the information
      system.
  CCI-000064:
    nist_control: []
    title: The organization establishes usage restrictions and implementation guidance
      for each allowed remote access method.
  CCI-000065:
    nist_control: AC-17
    title: The organization authorizes remote access to the information system prior
      to allowing such connections.
  CCI-000066:
    nist_control: []
    title: The organization enforces requirements for remote connections to the information
      system.
  CCI-000067:
    nist_control: AC-17
    title: The information system monitors remote access methods.
  CCI-000068:
    nist_control: AC-17
    title: The information system implements cryptographic mechanisms to protect the
      confidentiality of remote access sessions.
  CCI-000069:
    nist_control: AC-17
    title: The information system routes all remote accesses through an organization-defined
      number of managed network access control points.
  CCI-000070:
    nist_control: AC-17
    title: The organization authorizes the execution of privileged commands via remote
      access only for organization-defined needs.
  CCI-000071:
    nist_control: []
    title: The organization monitors for unauthorized remote connections to the information
      system on an organization-defined frequency.
  CCI-000072:
    nist_control: AC-17
    title: The organization ensures that users protect information about remote access
      mechanisms from unauthorized use and disclosure.
  CCI-000073:
    nist_control: PM-1
    title: The organization develops an organization-wide information security program
      plan that provides an overview of the requirements for the security program
      and a description of the security program management controls and common controls
      in place or planned for meeting those requirements.
  CCI-000074:
    nist_control: PM-1
    title: The organization develops an organization-wide information security program
      plan that is approved by a senior official with responsibility and accountability
      for the risk being incurred to organizational operations (including mission,
      functions, image, and reputation), organizational assets, individuals, other
      organizations, and the Nation.
  CCI-000075:
    nist_control: PM-1
    title: The organization reviews the organization-wide information security program
      plan on an organization-defined frequency.
  CCI-000076:
    nist_control: PM-1
    title: The organization defines the frequency with which to review the organization-wide
      information security program plan.
  CCI-000077:
    nist_control: PM-1
    title: The organization updates the plan to address organizational changes and
      problems identified during plan implementation or security control assessments.
  CCI-000078:
    nist_control: PM-2
    title: The organization appoints a senior information security officer with the
      mission and resources to coordinate, develop, implement, and maintain an organization-wide
      information security program.
  CCI-000079:
    nist_control: []
    title: The organization ensures that remote sessions for accessing an organization-defined
      list of security functions and security-relevant information employ organization-defined
      additional security measures.
  CCI-000080:
    nist_control: PM-3
    title: The organization ensures that all capital planning and investment requests
      include the resources needed to implement the information security program and
      documents all exceptions to this requirement.
  CCI-000081:
    nist_control: PM-3
    title: The organization employs a business case/Exhibit 300/Exhibit 53 to record
      the resources required.
  CCI-000082:
    nist_control: AC-19
    title: The organization establishes usage restrictions for organization-controlled
      mobile devices.
  CCI-000083:
    nist_control: AC-19
    title: The organization establishes implementation guidance for organization-controlled
      mobile devices.
  CCI-000084:
    nist_control: AC-19
    title: The organization authorizes connection of mobile devices to organizational
      information systems.
  CCI-000085:
    nist_control: []
    title: The organization monitors for unauthorized connections of mobile devices
      to organizational information systems.
  CCI-000086:
    nist_control: []
    title: The organization enforces requirements for the connection of mobile devices
      to organizational information systems.
  CCI-000087:
    nist_control: []
    title: The organization disables information system functionality that provides
      the capability for automatic execution of code on mobile devices without user
      direction.
  CCI-000088:
    nist_control: []
    title: The organization issues specially configured mobile devices to individuals
      traveling to locations that the organization deems to be of significant risk
      in accordance with organizational policies and procedures.
  CCI-000089:
    nist_control: []
    title: The organization applies organization-defined inspection and preventative
      measures to mobile devices returning from locations that the organization deems
      to be of significant risk in accordance with organizational policies and procedures.
  CCI-000090:
    nist_control: []
    title: The organization restricts the use of writable, removable media in organizational
      information systems.
  CCI-000091:
    nist_control: []
    title: The organization prohibits the use of personally-owned, removable media
      in organizational information systems.
  CCI-000092:
    nist_control: []
    title: The organization prohibits the use of removable media in organizational
      information systems when the media has no identifiable owner.
  CCI-000093:
    nist_control: AC-20
    title: The organization establishes terms and conditions, consistent with any
      trust relationships established with other organizations owning, operating,
      and/or maintaining external information systems, allowing authorized individuals
      to access the information system from the external information systems.
  CCI-000094:
    nist_control: []
    title: The organization establishes terms and conditions, consistent with any
      trust relationships established with other organizations owning, operating,
      and/or maintaining external information systems, allowing authorized individuals
      to process organization-controlled information using the external information
      systems.
  CCI-000095:
    nist_control: []
    title: The organization prohibits authorized individuals from using an external
      information system to access the information system except in situations where
      the organization can verify the implementation of required security controls
      on the external system as specified in the organization^s information security
      policy and security plan.
  CCI-000096:
    nist_control: []
    title: The organization prohibits authorized individuals from using an external
      information system to access the information system or to process, store, or
      transmit organization-controlled information except in situations where the
      organization has approved information system connection or processing agreements
      with the organizational entity hosting the external information system.
  CCI-000097:
    nist_control: AC-20
    title: The organization restricts or prohibits the use of organization-controlled
      portable storage devices by authorized individuals on external information systems.
  CCI-000098:
    nist_control: AC-21
    title: The organization facilitates information sharing by enabling authorized
      users to determine whether access authorizations assigned to the sharing partner
      match the access restrictions on the information for organization-defined information
      circumstances where user discretion is required.
  CCI-000099:
    nist_control: AC-21
    title: The information system enforces information-sharing decisions by authorized
      users based on access authorizations of sharing partners and access restrictions
      on information to be shared.
  CCI-000100:
    nist_control: AT-1
    title: The organization develops and documents a security awareness and training
      policy that addresses purpose, scope, roles, responsibilities, management commitment,
      coordination among organizational entities, and compliance.
  CCI-000101:
    nist_control: AT-1
    title: The organization disseminates a security awareness and training policy
      to organization-defined personnel or roles.
  CCI-000102:
    nist_control: AT-1
    title: The organization reviews and updates the current security awareness and
      training policy in accordance with organization-defined frequency.
  CCI-000103:
    nist_control: AT-1
    title: The organization develops and documents procedures to facilitate the implementation
      of the security awareness and training policy and associated security awareness
      and training controls.
  CCI-000104:
    nist_control: AT-1
    title: The organization disseminates security awareness and training procedures
      to organization-defined personnel or roles.
  CCI-000105:
    nist_control: AT-1
    title: The organization reviews and updates the current security awareness and
      training procedures in accordance with an organization-defined frequency.
  CCI-000106:
    nist_control: AT-2
    title: The organization provides basic security awareness training to information
      system users (including managers, senior executives, and contractors) as part
      of initial training for new users.
  CCI-000107:
    nist_control: AT-2
    title: The organization includes practical exercises in security awareness training
      that simulate actual cyber attacks.
  CCI-000108:
    nist_control: AT-3
    title: The organization provides role-based security training to personnel with
      assigned security roles and responsibilities before authorizing access to the
      information system or performing assigned duties.
  CCI-000109:
    nist_control: AT-3
    title: The organization provides role-based security training to personnel with
      assigned security roles and responsibilities when required by information system
      changes.
  CCI-000110:
    nist_control: AT-3
    title: The organization provides refresher role-based security training to personnel
      with assigned security roles and responsibilities in accordance with organization-defined
      frequency.
  CCI-000111:
    nist_control: AT-3
    title: The organization defines a frequency for providing refresher role-based
      security training.
  CCI-000112:
    nist_control: AT-2
    title: The organization provides basic security awareness training to information
      system users (including managers, senior executives, and contractors) when required
      by information system changes.
  CCI-000113:
    nist_control: AT-4
    title: The organization documents individual information system security training
      activities, including basic security awareness training and specific information
      system security training.
  CCI-000114:
    nist_control: AT-4
    title: The organization monitors individual information system security training
      activities, including basic security awareness training and specific information
      system security training.
  CCI-000115:
    nist_control: []
    title: The organization establishes contact with selected groups and associations
      within the security community to facilitate ongoing security education and training;
      to stay up to date with the latest recommended security practices, techniques,
      and technologies; and to share current security-related information including
      threats, vulnerabilities, and incidents.
  CCI-000116:
    nist_control: []
    title: The organization institutionalizes contact with selected groups and associations
      within the security community to facilitate ongoing security education and training;
      to stay up to date with the latest recommended security practices, techniques,
      and technologies; and to share current security-related information including
      threats, vulnerabilities, and incidents.
  CCI-000117:
    nist_control: AU-1
    title: The organization develops and documents an audit and accountability policy
      that addresses purpose, scope, roles, responsibilities, management commitment,
      coordination among organizational entities, and compliance.
  CCI-000118:
    nist_control: []
    title: The organization disseminates a formal, documented, audit and accountability
      policy to elements within the organization having associated audit and accountability
      roles and responsibilities.
  CCI-000119:
    nist_control: AU-1
    title: The organization reviews and updates the audit and accountability policy
      on an organization-defined frequency.
  CCI-000120:
    nist_control: AU-1
    title: The organization develops and documents procedures to facilitate the implementation
      of the audit and accountability policy and associated audit and accountability
      controls.
  CCI-000121:
    nist_control: []
    title: The organization disseminates formal, documented, procedures to elements
      within the organization having associated audit and accountability roles and
      responsibilities.
  CCI-000122:
    nist_control: AU-1
    title: The organization reviews and updates the audit and accountability procedures
      on an organization-defined frequency.
  CCI-000123:
    nist_control: AU-2
    title: The organization determines the information system must be capable of auditing
      an organization-defined list of auditable events.
  CCI-000124:
    nist_control: AU-2
    title: The organization coordinates the security audit function with other organizational
      entities requiring audit-related information to enhance mutual support and to
      help guide the selection of auditable events.
  CCI-000125:
    nist_control: AU-2
    title: The organization provides a rationale for why the list of auditable events
      is deemed to be adequate to support after-the-fact investigations of security
      incidents.
  CCI-000126:
    nist_control: AU-2
    title: The organization determines that the organization-defined subset of the
      auditable events defined in AU-2 are to be audited within the information system.
  CCI-000127:
    nist_control: AU-2
    title: The organization reviews and updates the list of organization-defined audited
      events on an organization-defined frequency.
  CCI-000128:
    nist_control: []
    title: The organization includes execution of privileged functions in the list
      of events to be audited by the information system.
  CCI-000129:
    nist_control: []
    title: The organization defines in the auditable events that the information system
      must be capable of auditing based on a risk assessment and mission/business
      needs.
  CCI-000130:
    nist_control: AU-3
    title: The information system generates audit records containing information that
      establishes what type of event occurred.
  CCI-000131:
    nist_control: AU-3
    title: The information system generates audit records containing information that
      establishes when an event occurred.
  CCI-000132:
    nist_control: AU-3
    title: The information system generates audit records containing information that
      establishes where the event occurred.
  CCI-000133:
    nist_control: AU-3
    title: The information system generates audit records containing information that
      establishes the source of the event.
  CCI-000134:
    nist_control: AU-3
    title: The information system generates audit records containing information that
      establishes the outcome of the event.
  CCI-000135:
    nist_control: AU-3
    title: The information system generates audit records containing the organization-defined
      additional, more detailed information that is to be included in the audit records.
  CCI-000136:
    nist_control: []
    title: The organization centrally manages the content of audit records generated
      by organization-defined information system components.
  CCI-000137:
    nist_control: []
    title: The organization allocates audit record storage capacity.
  CCI-000138:
    nist_control: []
    title: The organization configures auditing to reduce the likelihood of storage
      capacity being exceeded.
  CCI-000139:
    nist_control: AU-5
    title: The information system alerts designated organization-defined personnel
      or roles in the event of an audit processing failure.
  CCI-000140:
    nist_control: AU-5
    title: The information system takes organization-defined actions upon audit failure
      (e.g., shut down information system, overwrite oldest audit records, stop generating
      audit records).
  CCI-000141:
    nist_control: PM-3
    title: The organization ensures that information security resources are available
      for expenditure as planned.
  CCI-000142:
    nist_control: PM-4
    title: The organization implements a process for ensuring that plans of action
      and milestones for the security program and the associated organizational information
      systems are maintained.
  CCI-000143:
    nist_control: []
    title: The information system provides a warning when allocated audit record storage
      volume reaches an organization-defined percentage of maximum audit record storage
      capacity.
  CCI-000144:
    nist_control: []
    title: The information system provides a real-time alert when organization-defined
      audit failure events occur.
  CCI-000145:
    nist_control: AU-5
    title: The information system enforces configurable network communications traffic
      volume thresholds reflecting limits on auditing capacity by delaying or rejecting
      network traffic which exceeds the organization-defined thresholds.
  CCI-000146:
    nist_control: []
    title: The organization defines the percentage of maximum audit record storage
      capacity that when exceeded, a warning is provided.
  CCI-000147:
    nist_control: AU-5
    title: The organization defines the audit failure events requiring real-time alerts.
  CCI-000148:
    nist_control: AU-6
    title: The organization reviews and analyzes information system audit records
      on an organization-defined frequency for indications of organization-defined
      inappropriate or unusual activity.
  CCI-000149:
    nist_control: AU-6
    title: The organization reports any findings to organization-defined personnel
      or roles for indications of organization-defined inappropriate or unusual activity.
  CCI-000150:
